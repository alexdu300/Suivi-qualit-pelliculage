<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Barcode Scanning Quality Control</title>\n    <link rel='stylesheet' href='styles.css'>\n    <script src='https://code.jquery.com/jquery-3.6.0.min.js'></script>\n    <script src='https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.0/JsBarcode.all.min.js'></script>\n</head>\n<body>\n    <h1>Film Coil Tracking Quality Control</h1>\n    <div id='barcode-scanner'>\n        <input type='text' id='barcode-input' placeholder='Scan barcode here' />\n        <button id='scan-button'>Scan</button>\n    </div>\n    <div id='barcode-output'>\n        <img id='barcode-image' alt='Barcode' />\n        <p id='barcode-info'></p>\n    </div>\n    <script>\n        $(document).ready(function() {\n            $('#scan-button').click(function() {\n                let barcodeValue = $('#barcode-input').val();\n                JsBarcode('#barcode-image', barcodeValue, {format: 'CODE128'});\n                $('#barcode-info').text('Scanned Barcode: ' + barcodeValue);\n                // Here you can add more implementation for quality control check\n            });\n        });\n    </script>\n</body>\n</html>
