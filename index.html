<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Quality Control - Barcode and Label Scanning</title>\n    <script src="https://cdn.rawgit.com/soldair/node-tesseract/gh-pages/tesseract.min.js"></script>\n</head>\n<body>\n    <h1>Barcode and Label Scanning Quality Control Application</h1>\n    <div>\n        <input type="file" id="imageInput" accept="image/*">\n        <button id="scanButton">Scan</button>\n    </div>\n    <div id="result">\n        <h2>Scanning Result:</h2>\n        <p id="outputText"></p>\n    </div>\n    <script>\n        document.getElementById('scanButton').addEventListener('click', function() {\n            const fileInput = document.getElementById('imageInput');\n            if (fileInput.files.length === 0) {\n                alert('Please select an image file first.');\n                return;\n            }\n            const img = fileInput.files[0];\n            Tesseract.recognize(\n                img,\n                'eng',\n                {\n                    logger: info => console.log(info)\n                }\n            ).then(({ data: { text } }) => {\n                document.getElementById('outputText').innerText = text;\n            });\n        });\n    </script>\n</body>\n</html>
